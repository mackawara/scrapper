name: Build & Deploy

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/scrapper
  ORACLE_VM_PRIVATE_KEY: ${{ secrets.ORACLE_PRIVATE_KEY }}
  ORACLE_VM_URL: ${{ secrets.ORACLE_VM_URL }}
  ORACLE_USERNAME: ${{ secrets.ORACLE_USERNAME }}

jobs:
  test:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set permissions for private key
        run: |
          echo "${{ secrets.ORACLE_PRIVATE_KEY }}" > oracle.key
          chmod 600 oracle.key

      - name: Pull latest image on server
        run: |
          ssh -o StrictHostKeyChecking=no -i oracle.key $ORACLE_USERNAME@$ORACLE_VM_URL 'docker pull ${{ env.DOCKER_IMAGE }}:latest'

      - name: Stop and restart app container
        run: |
          ssh -o StrictHostKeyChecking=no -i oracle.key $ORACLE_USERNAME@$ORACLE_VM_URL 'cd ${{ secrets.PROJECT_DIR }} && docker compose stop app && docker compose rm -f app && docker compose up -d app'

      - name: Clean up old images
        run: |
          ssh -o StrictHostKeyChecking=no -i oracle.key $ORACLE_USERNAME@$ORACLE_VM_URL 'docker image prune -f'

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no -i oracle.key $ORACLE_USERNAME@$ORACLE_VM_URL 'cd ${{ secrets.PROJECT_DIR }} && docker compose ps'
