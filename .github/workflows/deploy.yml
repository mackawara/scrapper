name: Build & Deploy (PM2)

on:
  push:
    branches: [main]

env:
  ORACLE_VM_PRIVATE_KEY: ${{ secrets.ORACLE_PRIVATE_KEY }}
  ORACLE_VM_URL: ${{ secrets.ORACLE_VM_URL }}
  ORACLE_USERNAME: ${{ secrets.ORACLE_USERNAME }}

jobs:
  test:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Set permissions for private key
        run: |
          echo "${{ secrets.ORACLE_PRIVATE_KEY }}" > oracle.key
          chmod 600 oracle.key

      - name: Pull latest changes and restart PM2
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          ssh -o StrictHostKeyChecking=no -i oracle.key "$ORACLE_USERNAME@$ORACLE_VM_URL" "BRANCH='$BRANCH' bash -s" <<'EOF'
            set -euo pipefail

            APP_DIR="$HOME/repos/scrapper"
            BRANCH="${BRANCH:-main}"

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git pull --ff-only origin "$BRANCH"

            if [ ! -d node_modules ] || [ package.json -nt node_modules ] || [ package-lock.json -nt node_modules ]; then
              npm ci
            fi

            npm run build
            pm2 restart scrapper --update-env || pm2 start ecosystem.config.js --env production
            pm2 save
          EOF
